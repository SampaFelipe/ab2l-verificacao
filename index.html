<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AB2L GenZ Law</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;600;700&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #7c3aed; --purple-light: #a855f7; --gold: #fbbf24;
  --bg: #05000f; --bg2: #0d0020; --text: #e9d5ff; --muted: #5b21b6;
}
html,body { min-height:100vh; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; }
body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

/* LOGIN */
.login-wrap { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
.login-box { width:100%; max-width:380px; background:var(--bg2); border:1px solid #2d1060; padding:36px 28px; display:flex; flex-direction:column; gap:20px; }
.login-title { font-family:'Bebas Neue'; font-size:24px; letter-spacing:3px; color:#fff; }
.login-sub { font-size:8px; letter-spacing:3px; color:var(--muted); }

/* MAIN */
.main { display:none; position:relative; z-index:1; }
.main.visible { display:block; }

.topbar { background:#08001a; border-bottom:1px solid #2d1060; padding:14px 28px; display:flex; align-items:center; justify-content:space-between; }
.topbar-brand { font-family:'Bebas Neue'; font-size:18px; letter-spacing:3px; color:#fff; }
.topbar-sub { font-size:8px; letter-spacing:2px; color:var(--muted); }

.content { max-width:900px; margin:0 auto; padding:32px 24px; display:flex; flex-direction:column; gap:28px; }

.section-title { font-size:9px; letter-spacing:3px; color:var(--muted); border-bottom:1px solid #1a0040; padding-bottom:10px; }

/* FORM */
.form-box { background:var(--bg2); border:1px solid #2d1060; padding:24px; display:flex; flex-direction:column; gap:14px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-field { display:flex; flex-direction:column; gap:5px; }
.form-label { font-size:7px; letter-spacing:3px; color:var(--muted); }
.form-input { background:#08001a; border:1px solid #2d1060; color:var(--text); font-family:'JetBrains Mono'; font-size:12px; padding:10px 12px; outline:none; transition:border-color .2s; }
.form-input:focus { border-color:var(--purple-light); }

/* TABLE */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:11px; }
th { font-size:7px; letter-spacing:3px; color:var(--muted); text-align:left; padding:10px 14px; border-bottom:1px solid #1a0040; font-weight:400; }
td { padding:12px 14px; border-bottom:1px solid #0d0025; color:var(--text); vertical-align:middle; }
tr:hover td { background:#08001a; }
.badge { display:inline-block; font-size:8px; letter-spacing:1px; padding:3px 10px; }
.badge.ativo { background:#022c1e; color:#10b981; border:1px solid #065f46; }
.badge.inativo { background:#1f0000; color:#f87171; border:1px solid #991b1b; }

/* BUTTONS */
.btn { font-family:'JetBrains Mono'; font-size:9px; letter-spacing:2px; padding:10px 18px; cursor:pointer; border:none; transition:all .2s; }
.btn-primary { background:var(--purple); color:#fff; }
.btn-primary:hover { background:var(--purple-light); }
.btn-danger { background:transparent; color:#f87171; border:1px solid #991b1b; font-size:8px; padding:5px 10px; }
.btn-danger:hover { background:#1f0000; }
.btn-toggle { background:transparent; border:1px solid #2d1060; color:var(--muted); font-size:8px; padding:5px 10px; }
.btn-toggle:hover { border-color:var(--purple-light); color:var(--purple-light); }
.btn-logout { background:transparent; border:1px solid #2d1060; color:var(--muted); font-size:8px; letter-spacing:2px; padding:6px 14px; cursor:pointer; }
.btn-logout:hover { border-color:#f87171; color:#f87171; }

.toast { position:fixed; bottom:24px; right:24px; background:#022c1e; border:1px solid #065f46; color:#10b981; font-size:9px; letter-spacing:2px; padding:12px 20px; z-index:999; display:none; animation:fadeIn .3s ease; }
.toast.error { background:#1f0000; border-color:#991b1b; color:#f87171; }
.toast.visible { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div>
      <div class="login-title">AB2L GENZ ADMIN</div>
      <div class="login-sub">// painel de gestão de embaixadores</div>
    </div>
    <div class="form-field">
      <div class="form-label">EMAIL</div>
      <input class="form-input" id="loginEmail" type="email" placeholder="admin@ab2l.org.br" />
    </div>
    <div class="form-field">
      <div class="form-label">SENHA</div>
      <input class="form-input" id="loginPass" type="password" placeholder="••••••••" />
    </div>
    <button class="btn btn-primary" onclick="login()">ENTRAR</button>
  </div>
</div>

<!-- MAIN PANEL -->
<div class="main" id="mainPanel">
  <div class="topbar">
    <div>
      <div class="topbar-brand">AB2L GENZ LAW — ADMIN</div>
      <div class="topbar-sub">// gestão de embaixadores</div>
    </div>
    <button class="btn-logout" onclick="logout()">SAIR</button>
  </div>

  <div class="content">

    <div class="section-title">// ADICIONAR NOVO EMBAIXADOR</div>

    <div class="form-box">
      <div class="form-row">
        <div class="form-field">
          <div class="form-label">NOME COMPLETO</div>
          <input class="form-input" id="fNome" type="text" placeholder="Nome do embaixador" />
        </div>
        <div class="form-field">
          <div class="form-label">EDIÇÃO</div>
          <input class="form-input" id="fEdicao" type="text" placeholder="#001" maxlength="5" />
        </div>
      </div>
      <div class="form-field">
        <div class="form-label">CHAVE EXCLUSIVA (da credencial)</div>
        <input class="form-input" id="fChave" type="text" placeholder="A7F2·C9B4·3E81·D506" maxlength="23" style="text-transform:uppercase;letter-spacing:2px" />
      </div>
      <button class="btn btn-primary" style="align-self:flex-start" onclick="adicionar()">+ CADASTRAR EMBAIXADOR</button>
    </div>

    <div class="section-title">// EMBAIXADORES CADASTRADOS</div>

    <div class="table-wrap">
      <table id="tabela">
        <thead>
          <tr>
            <th>NOME</th>
            <th>CHAVE</th>
            <th>EDIÇÃO</th>
            <th>STATUS</th>
            <th>CADASTRO</th>
            <th>AÇÕES</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:28px">Carregando...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ======================================================
     CONFIGURAÇÃO — substitua pelos seus valores Supabase
     ====================================================== -->
<script>
  const SUPABASE_URL = 'COLE_AQUI_SUA_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'COLE_AQUI_SUA_SUPABASE_ANON_KEY';
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.7/axios.min.js"></script>
<script>
let authToken = localStorage.getItem('ab2l_token') || null;

function toast(msg, err=false){
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast visible' + (err?' error':'');
  setTimeout(()=>t.classList.remove('visible'), 3000);
}

async function login(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  try {
    const res = await axios.post(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,
      { email, password: pass },
      { headers: { apikey: SUPABASE_ANON_KEY, 'Content-Type': 'application/json' } }
    );
    authToken = res.data.access_token;
    localStorage.setItem('ab2l_token', authToken);
    mostrarPainel();
  } catch(e){
    toast('Email ou senha incorretos', true);
  }
}

function logout(){
  authToken = null;
  localStorage.removeItem('ab2l_token');
  document.getElementById('mainPanel').classList.remove('visible');
  document.getElementById('loginWrap').style.display = 'flex';
}

function mostrarPainel(){
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('mainPanel').classList.add('visible');
  carregar();
}

async function carregar(){
  try {
    const res = await axios.get(
      `${SUPABASE_URL}/rest/v1/embaixadores?select=*&order=criado_em.desc`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${authToken}` } }
    );
    renderTabela(res.data);
  } catch(e){ toast('Erro ao carregar dados', true); }
}

function renderTabela(rows){
  const tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:28px">Nenhum embaixador cadastrado</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td style="font-weight:600">${r.nome}</td>
      <td style="color:#a855f7;letter-spacing:1px">${r.chave}</td>
      <td style="color:#fbbf24">${r.edicao}</td>
      <td><span class="badge ${r.status}">${r.status.toUpperCase()}</span></td>
      <td style="color:#3b1d70">${new Date(r.criado_em).toLocaleDateString('pt-BR')}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-toggle" onclick="toggleStatus('${r.id}','${r.status}')">
          ${r.status==='ativo'?'DESATIVAR':'ATIVAR'}
        </button>
        <button class="btn-danger" onclick="excluir('${r.id}','${r.nome}')">✕</button>
      </td>
    </tr>
  `).join('');
}

async function adicionar(){
  const nome  = document.getElementById('fNome').value.trim();
  const chave = document.getElementById('fChave').value.trim().toUpperCase();
  const edicao= document.getElementById('fEdicao').value.trim();
  if(!nome||!chave||!edicao){ toast('Preencha todos os campos', true); return; }
  try {
    await axios.post(
      `${SUPABASE_URL}/rest/v1/embaixadores`,
      { nome, chave, edicao, status: 'ativo' },
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${authToken}`, 'Content-Type': 'application/json', Prefer: 'return=minimal' } }
    );
    document.getElementById('fNome').value='';
    document.getElementById('fChave').value='';
    document.getElementById('fEdicao').value='';
    toast('Embaixador cadastrado!');
    carregar();
  } catch(e){ toast('Erro: chave pode já existir', true); }
}

async function toggleStatus(id, statusAtual){
  const novo = statusAtual==='ativo' ? 'inativo' : 'ativo';
  try {
    await axios.patch(
      `${SUPABASE_URL}/rest/v1/embaixadores?id=eq.${id}`,
      { status: novo },
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${authToken}`, 'Content-Type': 'application/json' } }
    );
    toast(`Status alterado para ${novo}`);
    carregar();
  } catch(e){ toast('Erro ao alterar status', true); }
}

async function excluir(id, nome){
  if(!confirm(`Remover ${nome}?`)) return;
  try {
    await axios.delete(
      `${SUPABASE_URL}/rest/v1/embaixadores?id=eq.${id}`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${authToken}` } }
    );
    toast('Embaixador removido');
    carregar();
  } catch(e){ toast('Erro ao remover', true); }
}

// auto-login se tiver token
if(authToken) mostrarPainel();
</script>
</body>
</html>
